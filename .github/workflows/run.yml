name: psx auto download

on:
  schedule:
    - cron: '30 11 * * 1-5'   # 4:30 PM PKT
    - cron: '0 13 * * 1-5'    # 6:00 PM PKT
    - cron: '0 16 * * 1-5'    # 9:00 PM PKT
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python download.py

      - name: Commit files
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add .
          git commit -m "auto download" || echo "no changes"
          git push
